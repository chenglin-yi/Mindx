name = "mindx-backend"
main = "src/index.js"
compatibility_date = "2024-06-01"

[[d1_databases]]
binding = "DB"
database_name = "mindx"
database_id = "YOUR_DATABASE_ID"

[vars]
API_KEY = "your-secret-api-key"
JWT_SECRET = "change-this-to-a-random-256-bit-key-in-production"
ALLOWED_ORIGINS = "http://localhost:5173"
